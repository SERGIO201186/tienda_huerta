/* ============ STORAGE (Google Sheet en la nube, con respaldo local) ============ */
function getCloudUrl() {
  try { return localStorage.getItem("huerta:cloud-url") || ""; } catch { return ""; }
}
function setCloudUrlLocal(url) {
  try { localStorage.setItem("huerta:cloud-url", url); } catch {}
}
function loadLocal(key, fallback) {
  try {
    const raw = localStorage.getItem("huerta:" + key);
    if (!raw) return fallback;
    return JSON.parse(raw);
  } catch { return fallback; }
}
function saveLocal(key, value) {
  try { localStorage.setItem("huerta:" + key, JSON.stringify(value)); } catch {}
}
async function cloudGet(key, url) {
  const cloudUrl = url || getCloudUrl();
  if (!cloudUrl) return undefined;
  try {
    const sep = cloudUrl.includes("?") ? "&" : "?";
    const res = await fetch(cloudUrl + sep + "key=" + encodeURIComponent(key));
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    return data === null ? undefined : data;
  } catch { return undefined; }
}
async function cloudSet(key, value) {
  const cloudUrl = getCloudUrl();
  if (!cloudUrl) return false;
  try {
    await fetch(cloudUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ key, value }),
    });
    return true;
  } catch { return false; }
}
async function loadKey(key, fallback) {
  const cloud = await cloudGet(key);
  if (cloud !== undefined) { saveLocal(key, cloud); return cloud; }
  return loadLocal(key, fallback);
}
function saveKey(key, value) {
  saveLocal(key, value);
  cloudSet(key, value);
}

  async function probarTienda(url) {
    setTiendaStatus({ state: "loading" });
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error("La respuesta no es una lista de productos.");
      setTiendaStatus({ state: "ok", count: data.length });
      cargarProductos(url);
    } catch (err) {
      setTiendaStatus({ state: "error", message: err.message });
    }
  }

  function toDirectImageUrl_(url) {
    if (!url) return "";
    const t = String(url).trim();
    let m = t.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
    m = t.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m && t.includes("drive.google.com")) return `https://lh3.googleusercontent.com/d/${m[1]}`;
    m = t.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/);
    if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
    return t;
  }

  function generarSkuProducto_(segmentKey, lista) {
    const prefijos = { inmediato: "INM", futuro: "FUT", otros: "OTR" };
    const prefix = prefijos[segmentKey] || "GEN";
    const pat = new RegExp("^" + prefix + "-(\\d+)$");
    let max = 0;
    lista.forEach(p => { const mm = String(p.id).match(pat); if (mm) { const n = parseInt(mm[1], 10); if (n > max) max = n; } });
    return `${prefix}-${String(max + 1).padStart(3, "0")}`;
  }

  async function cargarProductos(urlOverride) {
    const url = urlOverride || config.tiendaUrl;
    if (!url) { setProductosStatus({ state: "error", message: "Conecta primero la URL de la Tienda Virtual en Conexión de Apps" }); return; }
    setProductosStatus({ state: "loading" });
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error("La tienda no devolvió una lista de productos.");
      const internos = await loadKey("productos-internos", {});
      const merged = data.map(p => ({ ...p, precio: Number(p.precio) || 0, ...(internos[p.id] || {}) }));
      setProductos(merged);
      setProductosStatus({ state: "ok", count: merged.length });
    } catch (err) {
      setProductosStatus({ state: "error", message: err.message });
    }
  }

  async function guardarProductoRemoto(datos, esNuevo) {
    if (!config.tiendaUrl) throw new Error("No hay URL de Tienda Virtual conectada");
    const payload = {
      id: datos.id,
      segment: datos.segment,
      categoria: datos.categoria,
      nombre: datos.nombre,
      descripcion: datos.descripcion || "",
      precio: Number(datos.precio) || 0,
      imagen: toDirectImageUrl_(datos.imagen || ""),
      action: esNuevo ? "add" : "update",
    };
    const res = await fetch(config.tiendaUrl, { method: "POST", body: JSON.stringify(payload) });
    if (!res.ok) throw new Error("HTTP " + res.status);
    // Guarda los datos internos (costo, proveedor, existencia) solo en el panel, no en la tienda pública
    const internos = await loadKey("productos-internos", {});
    internos[datos.id] = { costo: datos.costo || 0, proveedor: datos.proveedor || "", existencia: datos.existencia || 0 };
    await saveKey("productos-internos", internos);
    return { ok: true, id: datos.id, imagen: payload.imagen };
  }

  async function eliminarProductoRemoto(id) {
    if (!config.tiendaUrl) throw new Error("No hay URL de Tienda Virtual conectada");
    const res = await fetch(config.tiendaUrl, { method: "POST", body: JSON.stringify({ action: "delete", id }) });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const internos = await loadKey("productos-internos", {});
    delete internos[id];
    await saveKey("productos-internos", internos);
    return { ok: true };
  }

  async function cambiarEstadoProductoRemoto(id, nuevoEstado) {
    if (!config.tiendaUrl) throw new Error("No hay URL de Tienda Virtual conectada");
    const accion = nuevoEstado === "reservado" ? "reservar" : "liberar";
    const res = await fetch(config.tiendaUrl, { method: "POST", body: JSON.stringify({ action: accion, id }) });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  async function importarColaboradores(urlOverride) {
    const url = urlOverride || config.odsUrl;
    if (!url) { setEmpleadosStatus({ state: "error", message: "Primero conecta la URL de ODS en Conexión de Apps" }); return; }
    setEmpleadosStatus({ state: "loading" });
    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ accion: "obtenerColaboradores" }),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const raw = await res.json();
      const arr = extractArray_(raw);
      if (!arr) { setEmpleadosStatus({ state: "error", message: "No se encontró una lista de colaboradores en la respuesta." }); return; }
      setEmpleados(prev => {
        const prevById = {};
        prev.forEach(e => { prevById[e.id] = e; });
        return arr.map(item => {
          const id = String(pick_(item, ["idColaborador", "id"]) || uid());
          const existing = prevById[id];
          return {
            id,
            nombre: pick_(item, ["nombreCompleto", "nombre"]) || (existing ? existing.nombre : ""),
            puesto: pick_(item, ["puesto"]) || (existing ? existing.puesto : ""),
            fechaIngreso: pick_(item, ["fechaIngreso"]) || (existing ? existing.fechaIngreso : ""),
            telefono: pick_(item, ["telefono"]) || (existing ? existing.telefono : ""),
            domicilio: pick_(item, ["domicilio"]) || (existing ? existing.domicilio : ""),
            familiarNombre: pick_(item, ["familiarNombre"]) || (existing ? existing.familiarNombre : ""),
            familiarTelefono: pick_(item, ["familiarTelefono"]) || (existing ? existing.familiarTelefono : ""),
            nota: pick_(item, ["nota"]) || (existing ? existing.nota : ""),
            usuario: pick_(item, ["usuario"]) || (existing ? existing.usuario : ""),
            pin: pick_(item, ["pin"]) || (existing ? existing.pin : ""),
            estatus: pick_(item, ["estatus"]) || (existing ? existing.estatus : "ACTIVO"),
            salario: existing ? existing.salario : 0,
            _remote: item,
          };
        });
      });
      setEmpleadosStatus({ state: "ok", count: arr.length });
    } catch (err) {
      setEmpleadosStatus({ state: "error", message: err.message });
    }
  }

  async function crearColaboradorRemoto(url, datos) {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ accion: "guardarColaborador", datos }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  async function probarNube(url) {
    setCloudStatus({ state: "loading" });
    try {
      const sep = url.includes("?") ? "&" : "?";
      const res = await fetch(url + sep + "key=__test__");
      if (!res.ok) throw new Error("HTTP " + res.status);
      await res.json();
      setCloudUrlLocal(url);
      setCloudUrl(url);
      setCloudStatus({ state: "ok" });
      const [emp, gas, veh] = await Promise.all([
        cloudGet("empleados", url), cloudGet("gastos-hormiga", url), cloudGet("vehiculos", url),
      ]);
      if (emp !== undefined) setEmpleados(emp); else cloudSet("empleados", empleados);
      if (gas !== undefined) setGastos(gas); else cloudSet("gastos-hormiga", gastos);
      if (veh !== undefined) setVehiculos(veh); else cloudSet("vehiculos", vehiculos);
    } catch (err) {
      setCloudStatus({ state: "error", message: err.message });
    }
  }

  const totalNomina = useMemo(() => empleados.filter(e => e.estatus === "ACTIVO").reduce((s, e) => s + Number(e.salario || 0), 0), [empleados]);
  const totalGastosHormiga = useMemo(() => gastos.reduce((s, g) => s + Number(g.monto || 0), 0), [gastos]);
  const totalVehiculos = useMemo(() => vehiculos.reduce((s, v) => s + v.gastos.reduce((a, g) => a + Number(g.monto || 0), 0), 0), [vehiculos]);
  const totalGastosFijos = useMemo(() => gastosFijos.filter(g => g.activo !== false).reduce((s, g) => s + Number(g.monto || 0), 0), [gastosFijos]);
  const totalInmediato = useMemo(() => odsData.reduce((s, o) => s + Number(o.total || 0), 0), [odsData]);
  const porCobrarInmediato = useMemo(() => odsData.reduce((s, o) => s + Number(o.restante || 0), 0), [odsData]);
  const totalPrevisionContratado = useMemo(() => previsionData.reduce((s, p) => s + Number(p.total || 0), 0), [previsionData]);
  const totalPrevisionAbonado = useMemo(() => previsionData.reduce((s, p) => s + Number(p.abonado || 0), 0), [previsionData]);
  const porCobrarPrevision = totalPrevisionContratado - totalPrevisionAbonado;
  const gastosOperativosMes = totalNomina + totalGastosHormiga + totalVehiculos + totalGastosFijos;
  const ingresosMes = totalInmediato + totalPrevisionAbonado;
  const utilidadMes = ingresosMes - gastosOperativosMes;

  const gastosPorCategoria = useMemo(() => {
    const map = {};
    gastos.forEach(g => { map[g.categoria] = (map[g.categoria] || 0) + Number(g.monto || 0); });
    vehiculos.forEach(v => v.gastos.forEach(g => { map["Vehículos: " + g.tipo] = (map["Vehículos: " + g.tipo] || 0) + Number(g.monto || 0); }));
    gastosFijos.filter(g => g.activo !== false).forEach(g => { map["Fijo: " + g.concepto] = (map["Fijo: " + g.concepto] || 0) + Number(g.monto || 0); });
    map["Nómina"] = totalNomina;
    return Object.entries(map).map(([name, value]) => ({ name, value }));
  }, [gastos, vehiculos, gastosFijos, totalNomina]);

  function extractArray_(data) {
    if (Array.isArray(data)) return data;
    if (data && typeof data === "object") {
      for (const k of Object.keys(data)) {
        if (Array.isArray(data[k])) return data[k];
      }
    }
    return null;
  }

  function pick_(obj, candidates) {
    for (const c of candidates) if (obj[c] !== undefined && obj[c] !== null) return obj[c];
    const lower = {};
    Object.keys(obj).forEach(k => { lower[k.toLowerCase()] = obj[k]; });
    for (const c of candidates) {
      const v = lower[c.toLowerCase()];
      if (v !== undefined && v !== null) return v;
    }
    return undefined;
  }

  function normalizeOds_(arr) {
    const num = (item, keys) => Number(pick_(item, keys) || 0);
    return arr.map(item => {
      const total = num(item, ["totalGeneral", "TOTAL", "PRECIO_TOTAL", "total"]);
      const restante = num(item, ["restante", "RESTANTE", "SALDO"]);
      const costoAtaud = num(item, ["costoAtaud"]);
      const costoUrna = num(item, ["costoUrna"]);
      const costoEmbalsamado = num(item, ["costoEmbalsamado"]);
      const costoSala = num(item, ["costoSala"]);
      const costoTraslado = num(item, ["costoTraslado"]);
      const costoAdicionalCremacion = num(item, ["costoAdicionalCremacion"]);
      const costoExcesoPeso = num(item, ["costoExcesoPeso"]);
      const otrosCargos = num(item, ["otrosCargos"]);
      const costoDirecto = costoAtaud + costoUrna + costoEmbalsamado + costoSala + costoTraslado + costoAdicionalCremacion + costoExcesoPeso + otrosCargos;
      return {
        folio: pick_(item, ["folio", "FOLIO"]) || "",
        finado: pick_(item, ["fallecido", "FALLECIDO", "FINADO", "TITULAR", "finado"]) || "",
        contratante: pick_(item, ["contratante", "CONTRATANTE"]) || "",
        modalidadServicio: pick_(item, ["modalidadServicio"]) || "",
        fechaCreacion: pick_(item, ["fechaCreacion"]) || "",
        total,
        restante,
        costoAtaud, costoUrna, costoEmbalsamado, costoSala, costoTraslado, costoAdicionalCremacion, costoExcesoPeso, otrosCargos,
        costoDirecto,
        estatus: (pick_(item, ["estatus", "ESTATUS", "ESTADO_MANUAL"]) || (restante <= 0 ? "LIQUIDADO" : "PENDIENTE")) || "",
      };
    });
  }

  function normalizePrevision_(arr) {
    return arr.map(item => {
      const total = Number(pick_(item, ["PRECIO_TOTAL", "precioTotal", "TOTAL", "total"]) || 0);
      const abonado = Number(pick_(item, ["PAGADO_A_LA_FECHA", "ABONADO", "abonado"]) || 0);
      let estatus = pick_(item, ["ESTADO_MANUAL", "ESTATUS", "estatus"]) || "";
      if (!estatus) estatus = total > 0 && abonado >= total ? "LIQUIDADO" : "VIGENTE";
      return {
        folio: pick_(item, ["FOLIO", "folio"]) || "",
        titular: pick_(item, ["TITULAR", "titular"]) || "",
        asesor: pick_(item, ["ASESOR", "asesor"]) || "",
        total, abonado,
        estatus: String(estatus).toUpperCase(),
      };
    });
  }

  async function probarConexion(tipo, urlOverride) {
    const url = urlOverride || (tipo === "ods" ? config.odsUrl : config.previsionUrl);
    if (!url) return;
    const setStatus = tipo === "ods" ? setOdsStatus : setPrevisionStatus;
    setStatus({ state: "loading" });
    try {
      let res;
      if (tipo === "ods") {
        res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ accion: "obtenerODS", filtros: {} }),
        });
      } else {
        res = await fetch(url);
      }
      if (!res.ok) throw new Error("HTTP " + res.status);
      const raw = await res.json();
      const arr = extractArray_(raw);
      if (!arr) {
        setStatus({ state: "error", message: "Conectó, pero el JSON no es una lista reconocible. Revisa el formato que devuelve tu script." });
        return;
      }
      const normalized = tipo === "ods" ? normalizeOds_(arr) : normalizePrevision_(arr);
      setStatus({ state: "ok", count: normalized.length });
      if (tipo === "ods") { setOdsData(normalized); setIsDemoOds(false); }
      if (tipo === "prevision") { setPrevisionData(normalized); setIsDemoPrevision(false); }
    } catch (err) {
      setStatus({ state: "error", message: err.message });
    }
  }

  return (
    <div style={{ background: T.bg, minHeight: "100vh", color: T.text, fontFamily: "'Inter', sans-serif" }}>
      <div className="md:hidden flex items-center justify-between px-4 py-3" style={{ borderBottom: `1px solid ${T.border}` }}>
        <div className="flex items-center gap-2">
          <SealLogo size={28} />
          <span style={{ fontFamily: "'Fraunces', serif" }} className="text-sm tracking-wide">FUNERARIA HUERTA</span>
        </div>
        <button onClick={() => setMobileNavOpen(!mobileNavOpen)} style={{ color: T.bronze }}>
          {mobileNavOpen ? <X size={22} /> : <Menu size={22} />}
        </button>
      </div>
      {mobileNavOpen && (
        <div className="md:hidden flex flex-col" style={{ borderBottom: `1px solid ${T.border}` }}>
          {NAV.map(n => (
            <button key={n.id} onClick={() => { setTab(n.id); setMobileNavOpen(false); }}
              style={{ color: tab === n.id ? T.bronze : T.textMuted, borderTop: `1px solid ${T.border}` }}
              className="flex items-center gap-3 px-4 py-3 text-sm text-left">
              <n.icon size={16} /> {n.label}
            </button>
          ))}
        </div>
      )}
      <div className="flex">
        <aside className="hidden md:flex flex-col w-64 shrink-0 px-5 py-6 gap-6" style={{ borderRight: `1px solid ${T.border}`, minHeight: "100vh" }}>
          <div className="flex items-center gap-3 px-1">
            <SealLogo size={36} />
            <div>
              <div style={{ fontFamily: "'Fraunces', serif", letterSpacing: "0.04em" }} className="text-sm leading-tight">FUNERARIA<br/>HUERTA</div>
              <div style={{ color: T.textMuted }} className="text-[11px] tracking-wider">PANEL DE CONTROL</div>
            </div>
          </div>
          <nav className="flex flex-col gap-1">
            {NAV.map(n => (
              <button key={n.id} onClick={() => setTab(n.id)}
                style={{ color: tab === n.id ? T.bronzeLight : T.textMuted, background: tab === n.id ? T.surfaceAlt : "transparent", borderLeft: tab === n.id ? `2px solid ${T.bronze}` : "2px solid transparent" }}
                className="flex items-center gap-3 px-3 py-2.5 rounded-md text-sm text-left transition-colors hover:text-[#EDEAE2]">
                <n.icon size={16} /> {n.label}
              </button>
            ))}
          </nav>
          <div className="mt-auto text-[11px]" style={{ color: T.textMuted }}>
            <div className="flex items-center gap-2 mb-1"><span style={{ width: 6, height: 6, borderRadius: 999, background: T.success }} />Datos guardados en este dispositivo</div>
            v1.0 · Panel Huerta
          </div>
        </aside>
        <main className="flex-1 px-4 md:px-8 py-6 md:py-8 max-w-6xl">
          {tab === "resumen" && <ResumenTab {...{ ingresosMes, gastosOperativosMes, utilidadMes, porCobrarInmediato, porCobrarPrevision, empleados, vehiculos, gastosPorCategoria, totalGastosHormiga }} />}
          {tab === "finanzas" && <FinanzasTab {...{ totalInmediato, totalPrevisionAbonado, totalNomina, totalGastosHormiga, totalVehiculos, gastosPorCategoria, ingresosMes, gastosOperativosMes, utilidadMes }} />}
          {tab === "inmediato" && <InmediatoTab odsData={odsData} isDemo={isDemoOds} />}
          {tab === "prevision" && <PrevisionTab data={previsionData} isDemo={isDemoPrevision} />}
          {tab === "rh" && <RHTab empleados={empleados} setEmpleados={setEmpleados} totalNomina={totalNomina} odsUrl={config.odsUrl} importarColaboradores={importarColaboradores} empleadosStatus={empleadosStatus} crearColaboradorRemoto={crearColaboradorRemoto} />}
          {tab === "hormiga" && <HormigaTab gastos={gastos} setGastos={setGastos} total={totalGastosHormiga} />}
          {tab === "vehiculos" && <VehiculosTab vehiculos={vehiculos} setVehiculos={setVehiculos} total={totalVehiculos} />}
          {tab === "fijos" && <GastosFijosTab gastosFijos={gastosFijos} setGastosFijos={setGastosFijos} total={totalGastosFijos} />}
          {tab === "proveedores" && <ProveedoresTab productos={productos} tiendaUrl={config.tiendaUrl} productosStatus={productosStatus} cargarProductos={cargarProductos} guardarProductoRemoto={guardarProductoRemoto} eliminarProductoRemoto={eliminarProductoRemoto} cambiarEstadoProductoRemoto={cambiarEstadoProductoRemoto} setProductos={setProductos} generarSkuProducto={generarSkuProducto_} toDirectImageUrl={toDirectImageUrl_} proveedoresDir={proveedoresDir} setProveedoresDir={setProveedoresDir} />}
          {tab === "rentabilidad" && <RentabilidadTab odsData={odsData} isDemoOds={isDemoOds} gastosFijosMes={gastosOperativosMes} />}
          {tab === "conexion" && <ConexionTab config={config} setConfig={setConfig} odsStatus={odsStatus} previsionStatus={previsionStatus} probarConexion={probarConexion} cloudUrl={cloudUrl} cloudStatus={cloudStatus} probarNube={probarNube} tiendaStatus={tiendaStatus} probarTienda={probarTienda} />}
        </main>
      </div>
    </div>
  );
}

function FinanzasTab(props) {
  const { totalInmediato, totalPrevisionAbonado, totalNomina, totalGastosHormiga, totalVehiculos, gastosPorCategoria, ingresosMes, gastosOperativosMes, utilidadMes } = props;
  const rows = [
    { label: "Ingresos por servicios inmediatos (ODS)", value: totalInmediato },
    { label: "Ingresos por abonos de previsión", value: totalPrevisionAbonado },
    { label: "Nómina", value: -totalNomina },
    { label: "Gastos hormiga", value: -totalGastosHormiga },
    { label: "Gastos de vehículos", value: -totalVehiculos },
  ];
  return (
    <div>
      <SectionTitle subtitle="Consolidado de ingresos y egresos" title="Control Financiero" />
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
        <KpiCard label="Ingresos" value={fmtMoney(ingresosMes)} icon={TrendingUp} />

function RHTab({ empleados, setEmpleados, totalNomina, odsUrl, importarColaboradores, empleadosStatus, crearColaboradorRemoto }) {
  const blank = { nombre: "", puesto: "VENDEDOR / ATENCIÓN", fechaIngreso: "", salario: "", telefono: "", domicilio: "", familiarNombre: "", familiarTelefono: "", usuario: "", contrasena: "", pin: "", nota: "" };
  const [form, setForm] = useState(blank);
  const [editingId, setEditingId] = useState(null);
  const [saving, setSaving] = useState(false);
  const [saveMsg, setSaveMsg] = useState(null);

  const startEdit = (emp) => {
    setForm({
      nombre: emp.nombre || "", puesto: emp.puesto || "VENDEDOR / ATENCIÓN", fechaIngreso: emp.fechaIngreso || "",
      salario: emp.salario || "", telefono: emp.telefono || "", domicilio: emp.domicilio || "",
      familiarNombre: emp.familiarNombre || "", familiarTelefono: emp.familiarTelefono || "",
      usuario: emp.usuario || "", contrasena: "", pin: emp.pin || "", nota: emp.nota || "",
    });
    setEditingId(emp.id);
    setSaveMsg(null);
  };
  const cancelEdit = () => { setForm(blank); setEditingId(null); };

  const guardar = async () => {
    if (!form.nombre || !form.salario) return;
    setSaveMsg(null);
    const id = editingId || uid();
    const previo = editingId ? empleados.find(e => e.id === editingId) : null;
    const remotoPrevio = previo ? previo._remote || {} : {};
    const remoto = {
      ...remotoPrevio,
      idColaborador: id,
      fechaIngreso: form.fechaIngreso,
      nombreCompleto: form.nombre,
      puesto: form.puesto,
      domicilio: form.domicilio,
      telefono: form.telefono,
      familiarNombre: form.familiarNombre,
      familiarTelefono: form.familiarTelefono,
      usuario: form.usuario,
      contrasena: form.contrasena || remotoPrevio.contrasena || "",
      pin: form.pin,
      nota: form.nota,
      estatus: previo ? previo.estatus : "ACTIVO",
    };
    const nuevo = {
      id, nombre: form.nombre, puesto: form.puesto, fechaIngreso: form.fechaIngreso,
      telefono: form.telefono, domicilio: form.domicilio, familiarNombre: form.familiarNombre,
      familiarTelefono: form.familiarTelefono, nota: form.nota,
      estatus: previo ? previo.estatus : "ACTIVO", salario: Number(form.salario),
      usuario: form.usuario, pin: form.pin, _remote: remoto,
    };
    if (odsUrl) {
      setSaving(true);
      try {
        const res = await crearColaboradorRemoto(odsUrl, remoto);
        if (!res || res.ok === false) throw new Error((res && res.mensaje) || "el servidor rechazó el guardado");
        setSaveMsg({ tone: "success", text: editingId ? "Colaborador actualizado en ambas apps." : "Colaborador creado y disponible para iniciar sesión en ambas apps." });
      } catch (err) {
        setSaveMsg({ tone: "danger", text: "No se guardó en tus apps (" + err.message + "). Se guardó solo aquí en el panel." });
      } finally {
        setSaving(false);
      }
    } else {
      setSaveMsg({ tone: "danger", text: "No está conectada la URL de ODS, así que esto solo quedó guardado aquí, no en tus apps." });
    }
    setEmpleados(editingId ? empleados.map(e => e.id === id ? nuevo : e) : [...empleados, nuevo]);
    setForm(blank);
    setEditingId(null);
  };
  const remove = (id) => setEmpleados(empleados.filter(e => e.id !== id));
  const toggle = async (emp) => {
    const nuevoEstatus = emp.estatus === "ACTIVO" ? "INACTIVO" : "ACTIVO";
    setEmpleados(empleados.map(e => e.id === emp.id ? { ...e, estatus: nuevoEstatus } : e));
    if (odsUrl) {
      try {
        await crearColaboradorRemoto(odsUrl, {
          ...(emp._remote || {}),
          idColaborador: emp.id,
          nombreCompleto: emp.nombre,
          puesto: emp.puesto,
          fechaIngreso: emp.fechaIngreso,
          telefono: emp.telefono,
          estatus: nuevoEstatus,
        });
        setSaveMsg({ tone: "success", text: `Estatus de ${emp.nombre} actualizado en ambas apps.` });
      } catch (err) {
        setSaveMsg({ tone: "danger", text: "El estatus cambió aquí, pero no se reflejó en tus apps: " + err.message });
      }
    } else {
      setSaveMsg({ tone: "danger", text: "El estatus solo cambió aquí — conecta la URL de ODS para que también se actualice en tus apps." });
    }
  };
  const setSalario = (id, val) => setEmpleados(empleados.map(e => e.id === id ? { ...e, salario: Number(val) || 0 } : e));
  const EmpStatusBadge = () => {
    if (empleadosStatus.state === "loading") return <Pill tone="info"><RefreshCw size={11} className="inline animate-spin mr-1" />Importando…</Pill>;
    if (empleadosStatus.state === "ok") return <Pill tone="success"><CheckCircle2 size={11} className="inline mr-1" />{empleadosStatus.count} colaboradores importados</Pill>;
    if (empleadosStatus.state === "error") return <Pill tone="danger"><AlertCircle size={11} className="inline mr-1" />{empleadosStatus.message}</Pill>;
    return null;
  };
  return (
    <div>
      <SectionTitle subtitle="Plantilla operativa" title="Empleados / RH" />
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
        <KpiCard label="Colaboradores activos" value={empleados.filter(e => e.estatus === "ACTIVO").length} icon={Users} />
        <KpiCard label="Nómina mensual" value={fmtMoney(totalNomina)} icon={Wallet} />
        <KpiCard label="Total registrados" value={empleados.length} icon={Users} />
      </div>
      <Card style={{ marginBottom: 16, borderColor: T.bronze }}>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Importar colaboradores reales de tu app</div>
        <p style={{ color: T.textMuted }} className="text-sm mb-3">
          Trae la lista de colaboradores ya registrados en tu app de Funeraria Huerta. El salario no se importa (tu app no lo guarda) — captúralo aquí una sola vez y se conserva aunque vuelvas a importar.
        </p>
        <div className="flex flex-wrap items-center gap-3">
          <Btn icon={RefreshCw} onClick={() => importarColaboradores()} disabled={!odsUrl}>Importar desde la app</Btn>
          <EmpStatusBadge />
        </div>
        {!odsUrl && <p style={{ color: T.textMuted }} className="text-xs mt-2">Primero conecta la URL de ODS en la pestaña "Conexión de Apps".</p>}
      </Card>
      <Card style={{ marginBottom: 16 }}>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">{editingId ? "Editar colaborador" : "Dar de alta colaborador (mismo acceso en las dos apps)"}</div>
        <div className="grid md:grid-cols-3 gap-3 mb-3">
          <Input label="Nombre completo" value={form.nombre} onChange={e => setForm({ ...form, nombre: e.target.value })} />
          <Select label="Puesto" value={form.puesto} onChange={e => setForm({ ...form, puesto: e.target.value })}>
            <option>VENDEDOR / ATENCIÓN</option><option>CHOFER / LOGÍSTICA</option><option>ADMINISTRADOR GENERAL</option><option>EMBALSAMADOR</option><option>LIMPIEZA / MANTENIMIENTO</option>
          </Select>
          <Input label="Fecha de ingreso" type="date" value={form.fechaIngreso} onChange={e => setForm({ ...form, fechaIngreso: e.target.value })} />
          <Input label="Salario mensual ($)" type="number" value={form.salario} onChange={e => setForm({ ...form, salario: e.target.value })} />
          <Input label="Teléfono" value={form.telefono} onChange={e => setForm({ ...form, telefono: e.target.value })} />
          <Input label="Domicilio" value={form.domicilio} onChange={e => setForm({ ...form, domicilio: e.target.value })} />
          <Input label="Contacto familiar (nombre)" value={form.familiarNombre} onChange={e => setForm({ ...form, familiarNombre: e.target.value })} />
          <Input label="Contacto familiar (teléfono)" value={form.familiarTelefono} onChange={e => setForm({ ...form, familiarTelefono: e.target.value })} />
          <Input label="Notas" value={form.nota} onChange={e => setForm({ ...form, nota: e.target.value })} />
        </div>
        <div style={{ color: T.textMuted, borderTop: `1px solid ${T.border}` }} className="text-xs uppercase tracking-wider mb-3 pt-3">Acceso (usuario, contraseña y PIN — válidos en ambas apps)</div>
        <div className="grid md:grid-cols-3 gap-3 mb-3">
          <Input label="Usuario" value={form.usuario} onChange={e => setForm({ ...form, usuario: e.target.value })} />
          <Input label="Contraseña" placeholder={editingId ? "(sin cambios si lo dejas vacío)" : ""} value={form.contrasena} onChange={e => setForm({ ...form, contrasena: e.target.value })} />
          <Input label="PIN" value={form.pin} onChange={e => setForm({ ...form, pin: e.target.value })} />
        </div>
        <div className="flex items-center gap-3">
          <Btn icon={editingId ? CheckCircle2 : Plus} onClick={guardar} disabled={saving}>{saving ? "Guardando…" : editingId ? "Guardar cambios" : "Registrar Colaborador"}</Btn>
          {editingId && <Btn variant="ghost" onClick={cancelEdit}>Cancelar</Btn>}
        </div>
        {saveMsg && (
          <p style={{ color: saveMsg.tone === "success" ? T.success : T.danger }} className="text-sm mt-2">{saveMsg.text}</p>
        )}
      </Card>
      <Card>
        {empleados.length === 0 ? (
          <p style={{ color: T.textMuted }} className="text-sm text-center py-6">Aún no hay colaboradores. Impórtalos de tu app o regístralos manualmente arriba.</p>
        ) : (
          <Table headers={["Nombre", "Puesto", "Ingreso", "Salario", "Teléfono", "Estatus", ""]}>
            {empleados.map(e => (
              <tr key={e.id}><Td>{e.nombre}</Td><Td muted>{e.puesto}</Td><Td muted>{fmtDate(e.fechaIngreso)}</Td>
                <Td>
                  <input type="number" value={e.salario} onChange={ev => setSalario(e.id, ev.target.value)}
                    style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, width: 90 }}
                    className="rounded-md px-2 py-1 text-sm outline-none" />
                </Td>
                <Td muted>{e.telefono}</Td>
                <Td><button onClick={() => toggle(e)}><Pill tone={e.estatus === "ACTIVO" ? "success" : "danger"}>{e.estatus}</Pill></button></Td>
                <Td>
                  <div className="flex items-center gap-2">
                    <button onClick={() => startEdit(e)} style={{ color: T.bronze }}><Edit3 size={14} /></button>
                    <button onClick={() => remove(e.id)} style={{ color: T.danger }}><Trash2 size={14} /></button>
                  </div>
                </Td></tr>
            ))}
          </Table>
        )}
      </Card>
    </div>
  );
}

const CATEGORIAS_HORMIGA = ["Cafetería / Atención", "Papelería", "Limpieza", "Propinas / Apoyos", "Mensajería", "Reparaciones menores", "Otro"];
function HormigaTab({ gastos, setGastos, total }) {
  const [form, setForm] = useState({ fecha: "", categoria: CATEGORIAS_HORMIGA[0], descripcion: "", monto: "", responsable: "" });
  const add = () => {
    if (!form.monto || !form.fecha) return;
    setGastos([{ id: uid(), ...form, monto: Number(form.monto) }, ...gastos]);
    setForm({ fecha: "", categoria: CATEGORIAS_HORMIGA[0], descripcion: "", monto: "", responsable: "" });
  };
  const remove = (id) => setGastos(gastos.filter(g => g.id !== id));
  const porCategoria = useMemo(() => {
    const map = {};
    gastos.forEach(g => map[g.categoria] = (map[g.categoria] || 0) + Number(g.monto || 0));
    return Object.entries(map).map(([name, value]) => ({ name, value }));
  }, [gastos]);
  return (
    <div>
      <SectionTitle subtitle="Gastos pequeños y recurrentes" title="Gastos Hormiga" />
      <div className="grid grid-cols-2 gap-3 mb-6">
        <KpiCard label="Total acumulado" value={fmtMoney(total)} icon={Receipt} />
        <KpiCard label="Registros" value={gastos.length} icon={Receipt} />
      </div>
      <div className="grid md:grid-cols-3 gap-4 mb-6">
        <Card style={{ gridColumn: "span 2" }}>
          <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Registrar gasto</div>
          <div className="grid md:grid-cols-2 gap-3 mb-3">
            <Input label="Fecha" type="date" value={form.fecha} onChange={e => setForm({ ...form, fecha: e.target.value })} />
            <Select label="Categoría" value={form.categoria} onChange={e => setForm({ ...form, categoria: e.target.value })}>
              {CATEGORIAS_HORMIGA.map(c => <option key={c}>{c}</option>)}
            </Select>
            <Input label="Descripción" value={form.descripcion} onChange={e => setForm({ ...form, descripcion: e.target.value })} />
            <Input label="Monto ($)" type="number" value={form.monto} onChange={e => setForm({ ...form, monto: e.target.value })} />
            <Input label="Responsable" value={form.responsable} onChange={e => setForm({ ...form, responsable: e.target.value })} />
          </div>
          <Btn icon={Plus} onClick={add}>Registrar Gasto</Btn>
        </Card>
        <Card>
          <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Por categoría</div>
          <ResponsiveContainer width="100%" height={180}>
            <PieChart>
              <Pie data={porCategoria} dataKey="value" nameKey="name" innerRadius={40} outerRadius={70}>
                {porCategoria.map((_, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
              </Pie>
              <Tooltip contentStyle={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text }} formatter={(v) => fmtMoney(v)} />
            </PieChart>
          </ResponsiveContainer>
        </Card>
      </div>
      <Card>
        {gastos.length === 0 ? (
          <p style={{ color: T.textMuted }} className="text-sm text-center py-6">Aún no has registrado gastos hormiga.</p>
        ) : (
          <Table headers={["Fecha", "Categoría", "Descripción", "Responsable", "Monto", ""]}>
            {gastos.map(g => (
              <tr key={g.id}><Td muted>{fmtDate(g.fecha)}</Td><Td>{g.categoria}</Td><Td muted>{g.descripcion}</Td><Td muted>{g.responsable}</Td><Td>{fmtMoney(g.monto)}</Td>
                <Td><button onClick={() => remove(g.id)} style={{ color: T.danger }}><Trash2 size={14} /></button></Td></tr>
            ))}
          </Table>
        )}
      </Card>
    </div>
  );
}

const TIPOS_GASTO_VEHICULO = ["Combustible", "Mantenimiento", "Verificación", "Seguro", "Multas", "Lavado", "Otro"];
function VehiculosTab({ vehiculos, setVehiculos, total }) {
  const [form, setForm] = useState({ nombre: "", placas: "", tipo: "Carroza", kmActual: "" });
  const [gastoForm, setGastoForm] = useState({});
  const addVehiculo = () => {
    if (!form.nombre) return;
    setVehiculos([...vehiculos, { id: uid(), ...form, kmActual: Number(form.kmActual || 0), gastos: [] }]);
    setForm({ nombre: "", placas: "", tipo: "Carroza", kmActual: "" });
  };
  const removeVehiculo = (id) => setVehiculos(vehiculos.filter(v => v.id !== id));
  const addGasto = (vid) => {
    const gf = gastoForm[vid];
    if (!gf || !gf.monto) return;
    setVehiculos(vehiculos.map(v => v.id === vid ? { ...v, gastos: [{ id: uid(), fecha: gf.fecha || "", tipo: gf.tipo || TIPOS_GASTO_VEHICULO[0], monto: Number(gf.monto), nota: gf.nota || "" }, ...v.gastos] } : v));
    setGastoForm({ ...gastoForm, [vid]: { fecha: "", tipo: TIPOS_GASTO_VEHICULO[0], monto: "", nota: "" } });
  };
  const removeGasto = (vid, gid) => setVehiculos(vehiculos.map(v => v.id === vid ? { ...v, gastos: v.gastos.filter(g => g.id !== gid) } : v));
  return (
    <div>
      <SectionTitle subtitle="Flota y mantenimiento" title="Control de Vehículos" />
      <div className="grid grid-cols-2 gap-3 mb-6">
        <KpiCard label="Vehículos en flota" value={vehiculos.length} icon={Truck} />
        <KpiCard label="Gasto total flota" value={fmtMoney(total)} icon={Wrench} />
      </div>
      <Card style={{ marginBottom: 16 }}>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Registrar vehículo</div>
        <div className="grid md:grid-cols-4 gap-3 mb-3">
          <Input label="Nombre / Unidad" value={form.nombre} onChange={e => setForm({ ...form, nombre: e.target.value })} />
          <Input label="Placas" value={form.placas} onChange={e => setForm({ ...form, placas: e.target.value })} />
          <Select label="Tipo" value={form.tipo} onChange={e => setForm({ ...form, tipo: e.target.value })}>
            <option>Carroza</option><option>Van</option><option>Vehículo de apoyo</option>
          </Select>
          <Input label="Kilometraje actual" type="number" value={form.kmActual} onChange={e => setForm({ ...form, kmActual: e.target.value })} />
        </div>
        <Btn icon={Plus} onClick={addVehiculo}>Agregar Vehículo</Btn>
      </Card>
      {vehiculos.length === 0 && (
        <Card><p style={{ color: T.textMuted }} className="text-sm text-center py-6">Aún no has registrado vehículos en la flota.</p></Card>
      )}
      <div className="flex flex-col gap-4">
        {vehiculos.map(v => {
          const gf = gastoForm[v.id] || { fecha: "", tipo: TIPOS_GASTO_VEHICULO[0], monto: "", nota: "" };
          const totalV = v.gastos.reduce((s, g) => s + Number(g.monto || 0), 0);
          return (
            <Card key={v.id}>
              <div className="flex flex-wrap items-center justify-between gap-2 mb-3">
                <div>
                  <div style={{ fontFamily: "'Fraunces', serif" }} className="text-lg">{v.nombre}</div>
                  <div style={{ color: T.textMuted }} className="text-xs">{v.tipo} · {v.placas} · {v.kmActual.toLocaleString()} km</div>
                </div>
                <div className="flex items-center gap-3">
                  <Pill tone="info">{fmtMoney(totalV)} gastado</Pill>
                  <button onClick={() => removeVehiculo(v.id)} style={{ color: T.danger }}><Trash2 size={16} /></button>
                </div>
              </div>
              <div className="grid md:grid-cols-5 gap-2 mb-3 items-end">
                <Input label="Fecha" type="date" value={gf.fecha} onChange={e => setGastoForm({ ...gastoForm, [v.id]: { ...gf, fecha: e.target.value } })} />
                <Select label="Tipo" value={gf.tipo} onChange={e => setGastoForm({ ...gastoForm, [v.id]: { ...gf, tipo: e.target.value } })}>
                  {TIPOS_GASTO_VEHICULO.map(t => <option key={t}>{t}</option>)}
                </Select>
                <Input label="Monto ($)" type="number" value={gf.monto} onChange={e => setGastoForm({ ...gastoForm, [v.id]: { ...gf, monto: e.target.value } })} />
                <Input label="Nota" value={gf.nota} onChange={e => setGastoForm({ ...gastoForm, [v.id]: { ...gf, nota: e.target.value } })} />
                <Btn icon={Plus} onClick={() => addGasto(v.id)}>Añadir</Btn>
              </div>
              <Table headers={["Fecha", "Tipo", "Nota", "Monto", ""]}>
                {v.gastos.map(g => (
                  <tr key={g.id}><Td muted>{fmtDate(g.fecha)}</Td>
                    <Td><span className="inline-flex items-center gap-1">{g.tipo === "Combustible" ? <Fuel size={12} /> : g.tipo === "Seguro" ? <ShieldCheck size={12} /> : <Wrench size={12} />} {g.tipo}</span></Td>
                    <Td muted>{g.nota}</Td><Td>{fmtMoney(g.monto)}</Td>
                    <Td><button onClick={() => removeGasto(v.id, g.id)} style={{ color: T.danger }}><Trash2 size={13} /></button></Td></tr>
                ))}
              </Table>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

const CATEGORIAS_FIJOS = ["Renta", "Pago de crédito/préstamo", "Seguro", "Servicios (luz/agua/internet)", "Software/suscripciones", "Otro"];
function GastosFijosTab({ gastosFijos, setGastosFijos, total }) {
  const blank = { concepto: "", categoria: CATEGORIAS_FIJOS[0], monto: "", diaPago: "", beneficiario: "", fechaInicio: "", fechaFin: "", saldoRestante: "", activo: true, nota: "" };
  const [form, setForm] = useState(blank);
  const [editingId, setEditingId] = useState(null);

  const startEdit = (g) => { setForm({ ...blank, ...g }); setEditingId(g.id); };
  const cancelEdit = () => { setForm(blank); setEditingId(null); };

  const guardar = () => {
    if (!form.concepto || !form.monto) return;
    const registro = { ...form, id: editingId || uid(), monto: Number(form.monto) || 0, saldoRestante: form.saldoRestante === "" ? "" : Number(form.saldoRestante) || 0 };
    setGastosFijos(editingId ? gastosFijos.map(g => g.id === editingId ? registro : g) : [...gastosFijos, registro]);
    setForm(blank); setEditingId(null);
  };
  const remove = (id) => setGastosFijos(gastosFijos.filter(g => g.id !== id));
  const toggleActivo = (id) => setGastosFijos(gastosFijos.map(g => g.id === id ? { ...g, activo: g.activo === false } : g));

  return (
    <div>
      <SectionTitle subtitle="Rentas, créditos y compromisos recurrentes" title="Gastos Fijos" />
      <div className="grid grid-cols-2 gap-3 mb-6">
        <KpiCard label="Total mensual (activos)" value={fmtMoney(total)} icon={Building} />
        <KpiCard label="Conceptos registrados" value={gastosFijos.length} icon={Building} />
      </div>

      <Card style={{ marginBottom: 16 }}>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">{editingId ? "Editar concepto" : "Registrar gasto fijo"}</div>
        <div className="grid md:grid-cols-3 gap-3 mb-3">
          <Input label="Concepto (ej. Renta del local)" value={form.concepto} onChange={e => setForm({ ...form, concepto: e.target.value })} />
          <Select label="Categoría" value={form.categoria} onChange={e => setForm({ ...form, categoria: e.target.value })}>
            {CATEGORIAS_FIJOS.map(c => <option key={c}>{c}</option>)}
          </Select>
          <Input label="Monto mensual ($)" type="number" value={form.monto} onChange={e => setForm({ ...form, monto: e.target.value })} />
          <Input label="Día de pago (1-31)" type="number" value={form.diaPago} onChange={e => setForm({ ...form, diaPago: e.target.value })} />
          <Input label="Beneficiario / Acreedor" value={form.beneficiario} onChange={e => setForm({ ...form, beneficiario: e.target.value })} />
          <Input label="Fecha de inicio" type="date" value={form.fechaInicio} onChange={e => setForm({ ...form, fechaInicio: e.target.value })} />
          <Input label="Fecha fin (si es a plazo, ej. crédito)" type="date" value={form.fechaFin} onChange={e => setForm({ ...form, fechaFin: e.target.value })} />
          <Input label="Saldo restante (si aplica)" type="number" value={form.saldoRestante} onChange={e => setForm({ ...form, saldoRestante: e.target.value })} />
          <Input label="Nota" value={form.nota} onChange={e => setForm({ ...form, nota: e.target.value })} />
        </div>
        <div className="flex items-center gap-3">
          <Btn icon={editingId ? CheckCircle2 : Plus} onClick={guardar}>{editingId ? "Guardar cambios" : "Registrar Gasto Fijo"}</Btn>
          {editingId && <Btn variant="ghost" onClick={cancelEdit}>Cancelar</Btn>}
        </div>
      </Card>

      <Card>
        {gastosFijos.length === 0 ? (
          <p style={{ color: T.textMuted }} className="text-sm text-center py-6">Aún no has registrado gastos fijos.</p>
        ) : (
          <Table headers={["Concepto", "Categoría", "Monto", "Día de pago", "Beneficiario", "Saldo restante", "Activo", ""]}>
            {gastosFijos.map(g => (
              <tr key={g.id}>
                <Td>{g.concepto}</Td><Td muted>{g.categoria}</Td><Td>{fmtMoney(g.monto)}</Td>
                <Td muted>{g.diaPago || "—"}</Td><Td muted>{g.beneficiario}</Td>
                <Td muted>{g.saldoRestante !== "" && g.saldoRestante !== undefined ? fmtMoney(g.saldoRestante) : "—"}</Td>
                <Td><button onClick={() => toggleActivo(g.id)}><Pill tone={g.activo !== false ? "success" : "danger"}>{g.activo !== false ? "Activo" : "Pausado"}</Pill></button></Td>

}

const TIPOS_PRODUCTO = ["Ataúd", "Urna"];
const SEGMENTOS_TIENDA = { inmediato: "Servicio Inmediato", futuro: "Planes a Futuro", otros: "Otros Artículos" };
function ProveedoresTab({ productos, tiendaUrl, productosStatus, cargarProductos, guardarProductoRemoto, eliminarProductoRemoto, cambiarEstadoProductoRemoto, setProductos, generarSkuProducto, toDirectImageUrl, proveedoresDir, setProveedoresDir }) {
  const blank = { id: "", segment: "inmediato", categoria: "", nombre: "", descripcion: "", precio: "", imagen: "", costo: "", proveedor: "", existencia: "" };
  const [form, setForm] = useState(blank);
  const [editing, setEditing] = useState(false);
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  const blankProv = { nombre: "", categoria: "Ataúdes", contacto: "", telefono: "", correo: "", direccion: "", nota: "" };
  const [provForm, setProvForm] = useState(blankProv);
  const [editingProvId, setEditingProvId] = useState(null);
  const guardarProveedor = () => {
    if (!provForm.nombre) return;
    const registro = { ...provForm, id: editingProvId || uid() };
    setProveedoresDir(editingProvId ? proveedoresDir.map(p => p.id === editingProvId ? registro : p) : [...proveedoresDir, registro]);
    setProvForm(blankProv); setEditingProvId(null);
  };
  const startEditProv = (p) => { setProvForm({ ...blankProv, ...p }); setEditingProvId(p.id); };
  const removeProv = (id) => setProveedoresDir(proveedoresDir.filter(p => p.id !== id));

  const StatusBadge = () => {
    if (productosStatus.state === "loading") return <Pill tone="info"><RefreshCw size={11} className="inline animate-spin mr-1" />Cargando…</Pill>;
    if (productosStatus.state === "ok") return <Pill tone="success"><CheckCircle2 size={11} className="inline mr-1" />{productosStatus.count} productos</Pill>;
    if (productosStatus.state === "error") return <Pill tone="danger"><AlertCircle size={11} className="inline mr-1" />{productosStatus.message}</Pill>;
    return null;
  };

  const startEdit = (p) => {
    setForm({
      id: p.id, segment: p.segment || "inmediato", categoria: p.categoria || "", nombre: p.nombre || "",
      descripcion: p.descripcion || "", precio: p.precio || "", imagen: p.imagen || "",
      costo: p.costo || "", proveedor: p.proveedor || "", existencia: p.existencia || "",
    });
    setEditing(true);
  };

  const guardar = async () => {
    if (!form.nombre || !form.precio) return;
    setSaving(true); setMsg(null);
    const esNuevo = !editing;
    const id = form.id || generarSkuProducto(form.segment, productos);
    const datos = { ...form, id };
    try {
      const res = await guardarProductoRemoto(datos, esNuevo);
      if (!res || res.ok === false) throw new Error((res && res.mensaje) || "el servidor rechazó el guardado");
      setProductos(prev => {
        const exists = prev.some(p => p.id === id);
        const limpio = { ...datos, imagen: toDirectImageUrl(datos.imagen) };
        return exists ? prev.map(p => p.id === id ? limpio : p) : [...prev, limpio];
      });
      setMsg({ tone: "success", text: editing ? "Producto actualizado en la Tienda Virtual." : "Producto agregado a la Tienda Virtual." });
      setForm(blank); setEditing(false);
    } catch (err) {
      setMsg({ tone: "danger", text: "No se guardó: " + err.message });
    } finally {
      setSaving(false);
    }
  };

  const eliminar = async (id) => {
    try {
      await eliminarProductoRemoto(id);
      setProductos(prev => prev.filter(p => p.id !== id));
    } catch (err) {
      setMsg({ tone: "danger", text: "No se pudo eliminar: " + err.message });
    }
  };

  const toggleEstado = async (p) => {
    const nuevoEstado = (p.estado || "disponible") === "disponible" ? "reservado" : "disponible";
    try {
      await cambiarEstadoProductoRemoto(p.id, nuevoEstado);
      setProductos(prev => prev.map(x => x.id === p.id ? { ...x, estado: nuevoEstado } : x));
    } catch (err) {
      setMsg({ tone: "danger", text: "No se pudo cambiar el estado: " + err.message });
    }
  };

  const valorInventario = productos.reduce((s, p) => s + (Number(p.costo) || 0) * (Number(p.existencia) || 0), 0);
  const previewUrl = toDirectImageUrl(form.imagen);

  return (
    <div>
      <SectionTitle subtitle="Catálogo de tu Tienda Virtual" title="Proveedores" />
      {!tiendaUrl && (
        <Card style={{ marginBottom: 16, borderColor: T.bronze }}>
          <p style={{ color: T.textMuted }} className="text-sm">Conecta primero la URL de la Tienda Virtual en la pestaña "Conexión de Apps" — lo que agregues aquí se guarda directo en tu catálogo público real.</p>
        </Card>
      )}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <KpiCard label="Productos en tienda" value={productos.length} icon={Package} />
        <KpiCard label="Servicio inmediato" value={productos.filter(p => p.segment === "inmediato").length} icon={Package} />
        <KpiCard label="Planes a futuro" value={productos.filter(p => p.segment === "futuro").length} icon={Package} />
        <KpiCard label="Valor de inventario (interno)" value={fmtMoney(valorInventario)} icon={Wallet} />
      </div>

      <Card style={{ marginBottom: 16 }}>
        <div className="flex flex-wrap items-center justify-between gap-2 mb-3">
          <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider">{editing ? "Editar producto" : "Agregar producto a la Tienda Virtual"}</div>
          <div className="flex items-center gap-2">
            <Btn icon={RefreshCw} variant="ghost" onClick={() => cargarProductos()} disabled={!tiendaUrl}>Actualizar lista</Btn>
            <StatusBadge />
          </div>
        </div>
        <div className="grid md:grid-cols-3 gap-3 mb-3">
          <Select label="Dónde aparece" value={form.segment} onChange={e => setForm({ ...form, segment: e.target.value })}>
            {Object.entries(SEGMENTOS_TIENDA).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
          </Select>
          <Input label="Categoría (ej. Ataúd, Urna)" value={form.categoria} onChange={e => setForm({ ...form, categoria: e.target.value })} />
          <Input label="Nombre" value={form.nombre} onChange={e => setForm({ ...form, nombre: e.target.value })} />
          <Input label="Precio al cliente ($)" type="number" value={form.precio} onChange={e => setForm({ ...form, precio: e.target.value })} />
          <Input label="Descripción" value={form.descripcion} onChange={e => setForm({ ...form, descripcion: e.target.value })} />
        </div>
        <div className="grid md:grid-cols-3 gap-3 mb-3 items-start">
          <div className="md:col-span-2">
            <Input label="Imagen (link de Google Drive u otra fuente)" placeholder="https://drive.google.com/file/d/.../view?usp=sharing" value={form.imagen} onChange={e => setForm({ ...form, imagen: e.target.value })} />
            <p style={{ color: T.textMuted }} className="text-xs mt-1">En Drive: Compartir → "Cualquier persona con el enlace". Se convierte automáticamente al formato correcto.</p>
          </div>
          {previewUrl && (
            <img src={previewUrl} alt="Vista previa" style={{ width: "100%", maxHeight: 110, objectFit: "cover", borderRadius: 8, border: `1px solid ${T.border}` }}
              onError={e => { e.currentTarget.style.display = "none"; }} />
          )}
        </div>
        <div style={{ color: T.textMuted, borderTop: `1px solid ${T.border}` }} className="text-xs uppercase tracking-wider mb-3 pt-3">Datos internos (solo visibles aquí en el panel, no en la tienda pública)</div>
        <div className="grid md:grid-cols-3 gap-3 mb-3">
          <Input label="Costo interno ($)" type="number" value={form.costo} onChange={e => setForm({ ...form, costo: e.target.value })} />
          <Input label="Proveedor" value={form.proveedor} onChange={e => setForm({ ...form, proveedor: e.target.value })} />
          <Input label="Existencia (piezas)" type="number" value={form.existencia} onChange={e => setForm({ ...form, existencia: e.target.value })} />
        </div>
        <div className="flex items-center gap-3">
          <Btn icon={editing ? CheckCircle2 : Plus} onClick={guardar} disabled={saving || !tiendaUrl}>{saving ? "Guardando…" : editing ? "Guardar cambios" : "Agregar a la Tienda"}</Btn>
          {editing && <Btn variant="ghost" onClick={() => { setForm(blank); setEditing(false); }}>Cancelar</Btn>}
        </div>
        {msg && <p style={{ color: msg.tone === "success" ? T.success : T.danger }} className="text-sm mt-2">{msg.text}</p>}
      </Card>

      <Card>
        {productos.length === 0 ? (
          <p style={{ color: T.textMuted }} className="text-sm text-center py-6">Aún no hay productos en el catálogo.</p>
        ) : (
          <Table headers={["Imagen", "Segmento", "Nombre", "Precio", "Costo interno", "Existencia", "Estado", ""]}>
            {productos.map(p => (
              <tr key={p.id}>
                <Td>
                  {p.imagen ? <img src={p.imagen} alt={p.nombre} style={{ width: 40, height: 40, objectFit: "cover", borderRadius: 6 }} onError={e => { e.currentTarget.style.display = "none"; }} /> : "—"}
                </Td>
                <Td muted>{SEGMENTOS_TIENDA[p.segment] || p.segment}</Td><Td>{p.nombre}</Td>
                <Td>{fmtMoney(p.precio)}</Td><Td muted>{p.costo ? fmtMoney(p.costo) : "—"}</Td><Td muted>{p.existencia || "—"}</Td>
                <Td>
                  <button onClick={() => toggleEstado(p)}>
                    <Pill tone={(p.estado || "disponible") === "disponible" ? "success" : "danger"}>{(p.estado || "disponible") === "disponible" ? "Disponible" : "Reservado"}</Pill>
                  </button>
                </Td>
                <Td>
                  <div className="flex items-center gap-2">
                    <button onClick={() => startEdit(p)} style={{ color: T.bronze }}><Edit3 size={14} /></button>
                    <button onClick={() => eliminar(p.id)} style={{ color: T.danger }}><Trash2 size={14} /></button>
                  </div>
                </Td>
              </tr>
            ))}
          </Table>
        )}
      </Card>

      <Card style={{ marginTop: 16, marginBottom: 16 }}>
        <p style={{ color: T.textMuted }} className="text-sm">
          Esto agrega/edita productos directamente en tu Tienda Virtual real — se ven igual ahí y, si tu app de Servicios Inmediatos usara esta misma URL, también ahí.
        </p>
      </Card>

      <SectionTitle subtitle="Contactos de tus proveedores" title="Directorio de Proveedores" />
      <Card style={{ marginBottom: 16 }}>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">{editingProvId ? "Editar proveedor" : "Agregar proveedor"}</div>
        <div className="grid md:grid-cols-3 gap-3 mb-3">
          <Input label="Nombre / Empresa" value={provForm.nombre} onChange={e => setProvForm({ ...provForm, nombre: e.target.value })} />
          <Select label="Categoría" value={provForm.categoria} onChange={e => setProvForm({ ...provForm, categoria: e.target.value })}>
            <option>Ataúdes</option><option>Urnas</option><option>Flores/Arreglos</option><option>Transporte</option><option>Insumos/Embalsamado</option><option>Imprenta/Papelería</option><option>Otro</option>
          </Select>
          <Input label="Persona de contacto" value={provForm.contacto} onChange={e => setProvForm({ ...provForm, contacto: e.target.value })} />
          <Input label="Teléfono" value={provForm.telefono} onChange={e => setProvForm({ ...provForm, telefono: e.target.value })} />
          <Input label="Correo" value={provForm.correo} onChange={e => setProvForm({ ...provForm, correo: e.target.value })} />
          <Input label="Dirección" value={provForm.direccion} onChange={e => setProvForm({ ...provForm, direccion: e.target.value })} />
          <Input label="Nota" value={provForm.nota} onChange={e => setProvForm({ ...provForm, nota: e.target.value })} />
        </div>
        <div className="flex items-center gap-3">
          <Btn icon={editingProvId ? CheckCircle2 : Plus} onClick={guardarProveedor}>{editingProvId ? "Guardar cambios" : "Agregar Proveedor"}</Btn>
          {editingProvId && <Btn variant="ghost" onClick={() => { setProvForm(blankProv); setEditingProvId(null); }}>Cancelar</Btn>}
        </div>
      </Card>
      <Card>
        {proveedoresDir.length === 0 ? (
          <p style={{ color: T.textMuted }} className="text-sm text-center py-6">Aún no has registrado proveedores.</p>
        ) : (
          <Table headers={["Nombre", "Categoría", "Contacto", "Teléfono", "Correo", ""]}>
            {proveedoresDir.map(p => (
              <tr key={p.id}>
                <Td>{p.nombre}</Td><Td muted>{p.categoria}</Td><Td muted>{p.contacto}</Td><Td muted>{p.telefono}</Td><Td muted>{p.correo}</Td>
                <Td>
                  <div className="flex items-center gap-2">
                    <button onClick={() => startEditProv(p)} style={{ color: T.bronze }}><Edit3 size={14} /></button>
                    <button onClick={() => removeProv(p.id)} style={{ color: T.danger }}><Trash2 size={14} /></button>
                  </div>
                </Td>
              </tr>
            ))}
          </Table>
        )}
      </Card>
    </div>
  );
}

function RentabilidadTab({ odsData, isDemoOds, gastosFijosMes }) {
  const ordenes = odsData;
  const n = Math.max(ordenes.length, 1);
  const costoFijoPorServicio = gastosFijosMes / n;

  const filas = ordenes.map(o => {
    const costoDirecto = o.costoDirecto || 0;
    const margenBruto = (o.total || 0) - costoDirecto;
    const utilidadNeta = margenBruto - costoFijoPorServicio;
    const margenPct = o.total > 0 ? (utilidadNeta / o.total) * 100 : 0;
    return { ...o, costoDirecto, margenBruto, utilidadNeta, margenPct };
  });

  const ingresos = filas.reduce((s, f) => s + (f.total || 0), 0);
  const costosDirectos = filas.reduce((s, f) => s + f.costoDirecto, 0);
  const costosFijosTotales = costoFijoPorServicio * filas.length;
  const utilidadTotal = ingresos - costosDirectos - costosFijosTotales;
  const margenPctTotal = ingresos > 0 ? (utilidadTotal / ingresos) * 100 : 0;

  const composicion = [
    { name: "Costos directos", value: costosDirectos },
    { name: "Costos fijos asignados", value: costosFijosTotales },
    { name: "Utilidad neta", value: Math.max(utilidadTotal, 0) },
  ];

  return (
    <div>
      <SectionTitle subtitle="¿Son rentables tus precios actuales?" title="Rentabilidad de Servicios" />
      {isDemoOds && <DemoBanner appName="Funeraria Huerta (ODS)" />}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <KpiCard label="Ingresos (ODS)" value={fmtMoney(ingresos)} icon={TrendingUp} />
        <KpiCard label="Costos directos" value={fmtMoney(costosDirectos)} icon={Package} />
        <KpiCard label="Costos fijos asignados" value={fmtMoney(costosFijosTotales)} icon={Wallet} />
        <KpiCard label="Utilidad neta estimada" value={fmtMoney(utilidadTotal)} delta={`${margenPctTotal.toFixed(1)}% margen`} deltaGood={utilidadTotal >= 0} icon={Gauge} />
      </div>

      <Card style={{ marginBottom: 16 }}>
        <p style={{ color: T.textMuted }} className="text-sm">
          Los costos fijos (nómina + vehículos + gastos hormiga del periodo) se reparten por partes iguales entre las {filas.length} órdenes registradas: {fmtMoney(costoFijoPorServicio)} por servicio. Si el número de servicios reales al mes es distinto a este conteo, ajusta el periodo en "Conexión de Apps" para una lectura más exacta.
        </p>
      </Card>

      <div className="grid md:grid-cols-2 gap-4 mb-6">
        <Card>
          <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Composición del ingreso</div>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart>
              <Pie data={composicion} dataKey="value" nameKey="name" innerRadius={50} outerRadius={85} paddingAngle={2}>
                {composicion.map((_, i) => <Cell key={i} fill={[T.danger, T.info, T.success][i % 3]} />)}
              </Pie>
              <Tooltip contentStyle={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text }} formatter={(v) => fmtMoney(v)} />
              <Legend wrapperStyle={{ fontSize: 11, color: T.textMuted }} />
            </PieChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Utilidad neta por servicio</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={filas.slice(0, 12)}>
              <CartesianGrid stroke={T.border} vertical={false} />
              <XAxis dataKey="folio" stroke={T.textMuted} fontSize={10} />
              <YAxis stroke={T.textMuted} fontSize={11} tickFormatter={(v) => `${v / 1000}k`} />
              <Tooltip contentStyle={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text }} formatter={(v) => fmtMoney(v)} />
              <Bar dataKey="utilidadNeta" name="Utilidad neta" radius={[3, 3, 0, 0]}>
                {filas.slice(0, 12).map((f, i) => <Cell key={i} fill={f.utilidadNeta >= 0 ? T.success : T.danger} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </Card>
      </div>

      <Card>
        {filas.length === 0 ? (
          <p style={{ color: T.textMuted }} className="text-sm text-center py-6">No hay órdenes para analizar todavía.</p>
        ) : (
          <Table headers={["Folio", "Precio", "Costo directo", "Costo fijo asignado", "Utilidad neta", "Margen"]}>
            {filas.map(f => (
              <tr key={f.folio}>
                <Td muted>{f.folio}</Td><Td>{fmtMoney(f.total)}</Td><Td>{fmtMoney(f.costoDirecto)}</Td>
                <Td>{fmtMoney(costoFijoPorServicio)}</Td>
                <Td><span style={{ color: f.utilidadNeta >= 0 ? T.success : T.danger }}>{fmtMoney(f.utilidadNeta)}</span></Td>
                <Td><Pill tone={f.margenPct >= 20 ? "success" : f.margenPct >= 0 ? "info" : "danger"}>{f.margenPct.toFixed(1)}%</Pill></Td>
              </tr>
            ))}
          </Table>
        )}
      </Card>
    </div>
  );
}

function ConexionTab({ config, setConfig, odsStatus, previsionStatus, probarConexion, cloudUrl, cloudStatus, probarNube, tiendaStatus, probarTienda }) {
  const [urlInput, setUrlInput] = useState(cloudUrl || "");
  useEffect(() => { setUrlInput(cloudUrl || ""); }, [cloudUrl]);
  const StatusBadge = ({ status }) => {
    if (status.state === "loading") return <Pill tone="info"><RefreshCw size={11} className="inline animate-spin mr-1" />Probando…</Pill>;
    if (status.state === "ok") return <Pill tone="success"><CheckCircle2 size={11} className="inline mr-1" />Conectado · {status.count} registros</Pill>;
    if (status.state === "error") return <Pill tone="danger"><AlertCircle size={11} className="inline mr-1" />Error: {status.message}</Pill>;
    return <Pill tone="info">Sin probar</Pill>;
  };
  const CloudBadge = ({ status }) => {
    if (status.state === "loading") return <Pill tone="info"><RefreshCw size={11} className="inline animate-spin mr-1" />Conectando…</Pill>;
    if (status.state === "ok") return <Pill tone="success"><CheckCircle2 size={11} className="inline mr-1" />Guardando en la nube</Pill>;
    if (status.state === "error") return <Pill tone="danger"><AlertCircle size={11} className="inline mr-1" />Error: {status.message}</Pill>;
    return <Pill tone="info">Guardando solo en este dispositivo</Pill>;
  };
  return (
    <div>
      <SectionTitle subtitle="Vincula tus aplicaciones" title="Conexión de Apps" />

      <Card style={{ marginBottom: 16, borderColor: T.bronze }}>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Almacenamiento en la nube (RH, Gastos Hormiga, Vehículos)</div>
        <p style={{ color: T.textMuted }} className="text-sm mb-3">
          Pega aquí la URL de tu Google Apps Script para que estos datos se guarden en un Google Sheet y se vean igual desde cualquier dispositivo, en vez de quedar solo en este navegador.
        </p>
        <div className="flex flex-col md:flex-row gap-3 items-end mb-2">
          <div className="flex-1 w-full">
            <Input label="URL del Apps Script de almacenamiento" placeholder="https://script.google.com/macros/s/XXXX/exec" value={urlInput} onChange={e => setUrlInput(e.target.value)} />
          </div>
          <Btn icon={RefreshCw} onClick={() => probarNube(urlInput)}>Conectar</Btn>
        </div>
        <CloudBadge status={cloudStatus} />
      </Card>

      <Card style={{ marginBottom: 16 }}>
        <p style={{ color: T.textMuted }} className="text-sm mb-2">
          Tus apps ya sincronizan su información con Google Sheets mediante un Google Apps Script. Pega aquí la URL de cada Web App (termina en <code style={{ color: T.bronzeLight }}>/exec</code>) para que este panel jale tus datos reales.
        </p>
      </Card>
      <Card style={{ marginBottom: 16 }}>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Funeraria Huerta — Ventas Inmediatas (ODS)</div>
        <div className="flex flex-col md:flex-row gap-3 items-end mb-2">
          <div className="flex-1 w-full">
            <Input label="URL del Apps Script (Web App)" placeholder="https://script.google.com/macros/s/XXXX/exec" value={config.odsUrl} onChange={e => setConfig({ ...config, odsUrl: e.target.value })} />
          </div>
          <Btn icon={RefreshCw} onClick={() => probarConexion("ods")}>Probar Conexión</Btn>
        </div>
        <StatusBadge status={odsStatus} />
      </Card>
      <Card style={{ marginBottom: 16 }}>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Prevision-app — Ventas a Futuro</div>
        <div className="flex flex-col md:flex-row gap-3 items-end mb-2">
          <div className="flex-1 w-full">
            <Input label="URL del Apps Script (Web App)" placeholder="https://script.google.com/macros/s/XXXX/exec" value={config.previsionUrl} onChange={e => setConfig({ ...config, previsionUrl: e.target.value })} />
          </div>
          <Btn icon={RefreshCw} onClick={() => probarConexion("prevision")}>Probar Conexión</Btn>
        </div>
        <StatusBadge status={previsionStatus} />
      </Card>
      <Card style={{ marginBottom: 16 }}>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-3">Tienda Virtual — Catálogo público (ataúdes/urnas/planes)</div>
        <div className="flex flex-col md:flex-row gap-3 items-end mb-2">
          <div className="flex-1 w-full">
            <Input label="URL del Apps Script (Web App)" placeholder="https://script.google.com/macros/s/XXXX/exec" value={config.tiendaUrl} onChange={e => setConfig({ ...config, tiendaUrl: e.target.value })} />
          </div>
          <Btn icon={RefreshCw} onClick={() => probarTienda(config.tiendaUrl)}>Probar Conexión</Btn>
        </div>
        <StatusBadge status={tiendaStatus} />
      </Card>
      <Card>
        <div style={{ color: T.textMuted }} className="text-xs uppercase tracking-wider mb-2">Si ves un error al probar</div>
        <ul style={{ color: T.textMuted }} className="text-sm list-disc pl-5 space-y-1">
          <li>Verifica que el Apps Script esté implementado como "Aplicación web" con acceso "Cualquier persona".</li>
          <li>Si el JSON que devuelve no es una lista simple (folio, total, estatus, etc.), avísame el formato exacto para ajustar el panel.</li>
        </ul>
      </Card>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);
</script>
</body>
</html>
